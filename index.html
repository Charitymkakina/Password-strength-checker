<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Password Strength Checker</h2>

    <div class="password-wrapper">
        <input 
            type="password" 
            id="password" 
            placeholder="Enter password"
            onkeyup="checkPassword()"
        >
        <span class="toggle" onclick="togglePassword()">👁️</span>
    </div>

    <div class="strength-bar">
        <div id="strength-fill"></div>
    </div>

    <p id="message"></p>

    <ul>
        <li id="length">At least 8 characters</li>
        <li id="uppercase">Contains uppercase letter</li>
        <li id="lowercase">Contains lowercase letter</li>
        <li id="number">Contains a number</li>
        <li id="symbol">Contains a special character</li>
    </ul>

    <p id="entropy" class="entropy-text"></p>
</div>

<script src="script.js"></script>
</body>
</html>
